version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: equiflow-postgres
    environment:
      POSTGRES_USER: equiflow
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: equiflow_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equiflow -d equiflow_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: equiflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: equiflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: equiflow-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
    container_name: equiflow-api-gateway
    depends_on:
      - postgres
      - kafka
      - redis
    env_file: .env
    ports:
      - "8080:8080"
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
    container_name: equiflow-auth-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    ports:
      - "8081:8081"
    restart: unless-stopped

  order-service:
    build:
      context: ./order-service
    container_name: equiflow-order-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      # Set to "true" to bypass NYSE market hours check (useful for local dev/testing after 4 PM ET)
      MARKET_HOURS_BYPASS: "true"
    ports:
      - "8082:8082"
    restart: unless-stopped

  market-data-service:
    build:
      context: ./market-data-service
    container_name: equiflow-market-data-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    ports:
      - "8083:8083"
    restart: unless-stopped

  compliance-service:
    build:
      context: ./compliance-service
    container_name: equiflow-compliance-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    ports:
      - "8084:8084"
    restart: unless-stopped

  ledger-service:
    build:
      context: ./ledger-service
    container_name: equiflow-ledger-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    ports:
      - "8085:8085"
    restart: unless-stopped

  settlement-service:
    build:
      context: ./settlement-service
    container_name: equiflow-settlement-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    ports:
      - "8086:8086"
    restart: unless-stopped

  audit-service:
    build:
      context: ./audit-service
    container_name: equiflow-audit-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    ports:
      - "8087:8087"
    restart: unless-stopped

  saga-orchestrator:
    build:
      context: ./saga-orchestrator
    container_name: equiflow-saga-orchestrator
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    ports:
      - "8088:8088"
    restart: unless-stopped

  surge-simulator:
    build:
      context: ./surge-simulator
    container_name: equiflow-surge-simulator
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    ports:
      - "8089:8089"
    restart: unless-stopped

volumes:
  postgres_data:
