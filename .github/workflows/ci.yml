name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────────────
  # Stage 1: Build + Unit Tests
  # Runs on every push and PR. Required gate — nothing proceeds if
  # this fails. Fast feedback: unit tests only, no services needed.
  # ─────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build and run unit tests
        run: mvn clean verify --batch-mode -e

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/"
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────
  # Stage 2: Docker Build Validation
  # Verifies every service Dockerfile builds cleanly. Runs on PRs
  # and master. Depends on unit tests passing.
  # ─────────────────────────────────────────────────────────────────
  docker-validate:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Package JARs (skip tests)
        run: mvn clean package -DskipTests --batch-mode

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker builds
        run: |
          services=(
            api-gateway
            auth-service
            order-service
            market-data-service
            compliance-service
            ledger-service
            settlement-service
            audit-service
            saga-orchestrator
            surge-simulator
          )
          for service in "${services[@]}"; do
            echo "Building $service..."
            docker build "$service" --tag "equiflow/$service:ci" --quiet
          done
          echo "All Docker builds succeeded."

  # ─────────────────────────────────────────────────────────────────
  # Stage 3: Smoke Tests (PR Gate)
  # Spins up all services via docker-compose and runs @smoke tests.
  # Fast (<2 min). Validates auth and market-data are healthy before
  # any deeper integration testing. Runs on every PR.
  #
  # Implementation note for Stoke pipeline integration:
  #   If services are deployed to a shared staging environment rather
  #   than spun up in CI, replace the docker-compose steps with
  #   environment URL injection via secrets and remove the teardown.
  # ─────────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: docker-validate
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Package JARs
        run: mvn clean package -DskipTests --batch-mode

      - name: Start services
        run: |
          docker compose up -d
          echo "Waiting for services to be ready..."
          sleep 30

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        working-directory: tests/e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run smoke tests
        working-directory: tests/e2e
        run: npx playwright test --project=smoke
        env:
          CI: true
          BASE_URL: http://localhost:8080
          AUTH_URL: http://localhost:8081
          MARKET_URL: http://localhost:8083
          COMPLIANCE_URL: http://localhost:8084
          LEDGER_URL: http://localhost:8085
          AUDIT_URL: http://localhost:8087

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Tear down services
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────────────────────────
  # Stage 4: Integration + E2E Tests (merge to master only)
  # Runs the full suite — @integration + @e2e — after smoke passes.
  # Only triggers on merge to master (not on every PR) to keep PR
  # feedback loops fast. These tests validate cross-service flows
  # and the complete order lifecycle saga.
  # ─────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Package JARs
        run: mvn clean package -DskipTests --batch-mode

      - name: Start services
        run: |
          docker compose up -d
          echo "Waiting for services to be ready..."
          sleep 30

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        working-directory: tests/e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run integration tests
        working-directory: tests/e2e
        run: npx playwright test --project=integration
        env:
          CI: true
          BASE_URL: http://localhost:8080
          AUTH_URL: http://localhost:8081
          MARKET_URL: http://localhost:8083
          COMPLIANCE_URL: http://localhost:8084
          LEDGER_URL: http://localhost:8085
          AUDIT_URL: http://localhost:8087

      - name: Run E2E saga tests
        working-directory: tests/e2e
        run: npx playwright test --project=e2e
        env:
          CI: true
          BASE_URL: http://localhost:8080
          AUTH_URL: http://localhost:8081
          MARKET_URL: http://localhost:8083
          COMPLIANCE_URL: http://localhost:8084
          LEDGER_URL: http://localhost:8085
          AUDIT_URL: http://localhost:8087

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: tests/e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/e2e/test-results/
          retention-days: 7

      - name: Tear down services
        if: always()
        run: docker compose down -v
